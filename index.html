<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width , initial-scale=1.0">
        <title>
            PDF Resume Builder
        </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div clas="container">
            <h1>PDF Resume Builder</h1>
            <form id="resume-form">
                <input type="text" id="name" placeholder="'Full Name" required/>
                <input type="'text" id="email" placeholder="'Email" required/>
                <textarea id="summary" placeholder="Professional Summary"></textarea>
                <input type="text" id="skills" placeholder="Skills (comma seperated)"/>
                <textarea id="experience" placeholder="Experience"></textarea>
                <textarea id="education" placeholder="Education"></textarea>
                <button type="submit">Generate PDF</button>
            </form>
            <div id="preview">
                <h2 id="preview-name"></h2>
                <p id="preview-email"></p>
                <p id="preview-summary"></p>
                <p><strong>Skills:</strong><span id="preview-skills"></span></p>
                <p><strong>Experience:</strong><br/><span id="preview-experience"></span></p>
                <p><strong>Education:</strong><br/><span id="preview-education"></span></p>
            </div>
        </div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
